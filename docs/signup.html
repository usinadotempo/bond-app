<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bond | Criar Conta</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --panel: #111111; --accent: #f59e0b; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .auth-card { background: var(--panel); padding: 3rem; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid #222; }
        h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 2rem; }
        input, select { width: 100%; padding: 1rem; margin-bottom: 1rem; background: #222; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 1rem; background: var(--accent); border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Criar conta.</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="pass" placeholder="Senha">
        <select id="role">
            <option value="parent">Pai/Mãe</option>
            <option value="child">Filho(a)</option>
        </select>
        <button id="signupBtn">Registrar no Bond</button>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        console.log("Script carregado.");
        try {
            // Renomeado para 'sbClient' para evitar conflito de redeclaração
            const sbClient = window.supabase.createClient('https://lvxymjdbekmuqeyqrrwi.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2eHltamRiZWttdXFleXFycndpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTI4ODUsImV4cCI6MjA5MTQyODg4NX0.9yNRM-DAdQx8h1tmit46M45WDubB3fPYLylufr9oRG8');
            console.log("Supabase inicializado.");

            document.getElementById('signupBtn').addEventListener('click', async () => {
                const email = document.getElementById('email').value;
                const pass = document.getElementById('pass').value;
                const role = document.getElementById('role').value;
                
                if (!email || !pass) {
                    alert("Preencha e-mail e senha.");
                    return;
                }

                try {
                    const { data, error } = await sbClient.auth.signUp({
                        email: email,
                        password: pass,
                        options: { data: { role: role } }
                    });
                    
                    if (error) throw error;
                    alert("Conta criada! Verifique seu e-mail.");
                    window.location.href = 'login.html';
                } catch (err) {
                    alert("Erro ao registrar: " + err.message);
                }
            });
        } catch(e) {
            console.error("Erro na inicialização:", e);
        }
    </script>
</body>
</html>
